<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចូលប្រព័ន្ធ - Payment System</title>
    <style>
        body {
            font-family: 'Khmer', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #5a6fd8; }
        #message { text-align: center; margin-top: 15px; color: red; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ចូលប្រព័ន្ធ គ្រប់គ្រងការបង់ប្រាក់</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="ឈ្មោះអ្នកប្រើ" required>
            <input type="password" id="password" placeholder="ពាក្យសម្ងាត់" required>
            <button type="submit">ចូលប្រព័ន្ធ</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'កំពុងពិនិត្យ...';

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    messageDiv.style.color = 'green';
                    messageDiv.textContent = 'ចូលបានជោគជ័យ! កំពុងផ្ទេរ...';
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    messageDiv.textContent = result.message || 'ចូលបរាជ័យ!';
                }
            } catch (err) {
                messageDiv.textContent = 'មានបញ្ហាតភ្ជាប់ Server';
            }
        });
    </script>
</body>
</html>
